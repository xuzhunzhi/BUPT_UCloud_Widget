<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';"
    />
    <title>北邮云邮教学空间 · 作业待办</title>
    <link rel="stylesheet" href="../shared/themes.css" />
    <link rel="stylesheet" href="home.css" />
  </head>
  <body>
    <div class="layout">
      <header class="top top-bar">
        <div class="brand">
          <h1>云邮作业待办</h1>
          <p>北邮教学空间 · 本机抓取与缓存</p>
        </div>
        <button type="button" class="btn btn-settings" id="btn-settings">设置</button>
      </header>

      <section class="banner banner-login" id="login-needed-banner" hidden>
        <div class="banner-inner">
          <span class="banner-icon">&#9888;</span>
          <span>登录已过期，请登录后同步待办。</span>
          <button type="button" class="btn primary btn-sm" id="btn-auto-login">自动登录</button>
          <button type="button" class="btn btn-sm" id="btn-manual-login">手动登录</button>
        </div>
      </section>

      <section class="cards">
        <article class="card action-card">
          <h2>常用操作</h2>
          <div class="btn-row">
            <button type="button" class="btn primary" id="btn-sync">立即同步待办</button>
            <button type="button" class="btn" id="btn-login">登录教学空间</button>
          </div>
          <p class="hint">
            登录在独立窗口内完成；同步由本机 Python + Playwright 抓取并写入
            <code>homework_cache.json</code>。
          </p>
        </article>

        <article class="card action-card">
          <h2>桌面小组件</h2>
          <p class="muted">
            置顶小窗仅用于快速查看列表，与主页分开维护。打开后可拖动到桌面一角。
          </p>
          <button type="button" class="btn accent" id="btn-open-widget">打开桌面小组件</button>
        </article>

        <article class="card stats-card">
          <h2>缓存概览</h2>
          <dl class="stats" id="stats">
            <div><dt>条目数</dt><dd id="stat-count">—</dd></div>
            <div><dt>最近更新</dt><dd id="stat-time">—</dd></div>
            <div><dt>登录态</dt><dd id="stat-login">—</dd></div>
          </dl>
        </article>
      </section>

      <p id="status" class="status" role="status"></p>
    </div>
    <script src="../shared/theme-init.js"></script>
    <script src="home.js"></script>
  </body>
</html>
