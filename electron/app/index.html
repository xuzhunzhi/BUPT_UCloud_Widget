<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' attachment: file: data: https:;" />
  <title>云邮作业待办</title>
  <link rel="stylesheet" href="../shared/themes.css" />
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <div class="app-shell">
    <!-- Custom Title Bar -->
    <div class="titlebar" id="titlebar">
      <span class="titlebar-title">UCloud Widget</span>
      <div class="titlebar-controls">
        <button class="titlebar-btn titlebar-minimize" id="titlebar-minimize" aria-label="最小化">
          <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="5.5" width="10" height="1" fill="currentColor"/></svg>
        </button>
        <button class="titlebar-btn titlebar-close" id="titlebar-close" aria-label="关闭">
          <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>
    <div class="tab-viewport">
      <div class="tab-panels" id="tab-panels">

        <!-- 首页 Tab -->
        <section class="tab-panel" id="tab-home">
          <div class="tab-inner">
            <div class="user-card">
              <div class="user-avatar" id="user-avatar">?</div>
              <div class="user-info">
                <span class="user-name" id="user-name">未登录</span>
                <span class="user-id" id="user-id"></span>
              </div>
            </div>
            <div class="stat-cards-row">
              <div class="stat-card">
                <svg class="stat-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 6a2 2 0 012-2h12a2 2 0 012 2v13a2 2 0 01-2 2H6a2 2 0 01-2-2V6z"/><path d="M8 2v2M16 2v2"/><rect x="7" y="10" width="3" height="5" rx=".5"/><rect x="14" y="10" width="3" height="5" rx=".5"/></svg>
                <span class="stat-value" id="stat-course-count">&mdash;</span>
                <span class="stat-label">课程数</span>
              </div>
              <div class="stat-card">
                <svg class="stat-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 11l3 3 5-5"/></svg>
                <span class="stat-value" id="stat-task-count">&mdash;</span>
                <span class="stat-label">待办数</span>
              </div>
            </div>
            <div class="action-row">
              <button class="btn primary" id="btn-sync-home">立即同步</button>
              <button class="btn" id="btn-switch-user">切换用户</button>
              <button class="btn accent" id="btn-open-widget-home">打开小组件</button>
            </div>
            <div class="cache-info">
              <p class="cache-line" id="cache-updated">上次同步：&mdash;</p>
              <p class="cache-line" id="cache-status">状态：就绪</p>
            </div>
            <p id="status-home" class="status"></p>
          </div>
        </section>

        <!-- 待办 Tab -->
        <section class="tab-panel" id="tab-tasks">
          <div class="tab-inner">
            <div class="tasks-header">
              <h2 class="tab-heading">待办事项</h2>
            </div>

            <div class="tasks-toolbar">
              <button class="btn-icon" id="btn-sync-tasks" title="立即同步">&#x21BB;</button>
              <div class="filter-btn-wrap">
                <button class="btn-icon" id="btn-filter-popup" title="筛选条件">&#x2630;</button>
                <div id="filter-popup" class="filter-popup" style="display:none">
                  <select id="tasks-filter-course" class="tasks-select">
                    <option value="">全部课程</option>
                  </select>
                  <select id="tasks-filter-status" class="tasks-select">
                    <option value="">全部状态</option>
                    <option value="not-overdue">未逾期</option>
                    <option value="submitted">已提交</option>
                    <option value="overdue">已逾期</option>
                    <option value="urgent">24 小时内</option>
                    <option value="soon">3 天内</option>
                    <option value="upcoming">7 天内</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="tasks-summary">
              <span id="tasks-count"></span>
              <span id="tasks-updated"></span>
            </div>

            <div id="tasks-list" class="tasks-list"></div>

            <div id="tasks-empty" class="tasks-empty" style="display:none">
              <svg class="empty-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 11l3 3 5-5"/></svg>
              <p class="empty-text">暂无待办事项</p>
              <p class="empty-hint">点击「立即同步」拉取最新作业数据</p>
            </div>

            <!-- Task Detail View -->
            <div id="task-detail" class="task-detail" style="display:none">
              <div class="task-detail-topbar">
                <button class="task-detail-back" id="task-detail-back" title="返回列表">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                  <span>返回</span>
                </button>
                <span class="task-detail-status" id="task-detail-status"></span>
              </div>
              <div class="task-detail-scroll">
                <div class="task-detail-hero">
                  <h2 class="task-detail-title" id="task-detail-title"></h2>
                  <div class="task-detail-meta" id="task-detail-meta"></div>
                </div>
                <div class="task-detail-divider"></div>
                <div class="task-detail-body" id="task-detail-body"></div>
              </div>
            </div>

            <p id="status-tasks" class="status"></p>
          </div>
        </section>

        <!-- 课程 Tab -->
        <section class="tab-panel" id="tab-courses">
          <div class="tab-inner">
            <div class="courses-header">
              <h2 class="tab-heading">课程</h2>
              <span id="courses-count" class="badge-count"></span>
              <div style="margin-left:auto;display:flex;gap:6px">
                <button class="btn-icon" id="btn-course-edit" title="编辑课程"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M16 3l5 5L8 21H3v-5L16 3z"/></svg></button>
              </div>
            </div>

            <div id="courses-list" class="courses-list"></div>

            <div id="course-detail" class="course-detail" style="display:none">
              <button class="btn-icon course-detail-back" id="course-detail-back" aria-label="返回">&#x2190;</button>
              <h3 id="course-detail-name" class="course-detail-name"></h3>
              <p id="course-detail-meta" class="course-detail-meta"></p>
              <div id="course-detail-items" class="course-detail-items"></div>
            </div>

            <div id="courses-empty" class="tasks-empty" style="display:none">
              <svg class="empty-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6a2 2 0 012-2h12a2 2 0 012 2v13a2 2 0 01-2 2H6a2 2 0 01-2-2V6z"/><path d="M8 2v2M16 2v2"/><line x1="10" y1="10" x2="10" y2="16"/><line x1="14" y1="10" x2="14" y2="16"/></svg>
              <p class="empty-text">暂无课程数据</p>
              <p class="empty-hint">点击首页「立即同步」拉取最新数据</p>
            </div>

            <p id="status-courses" class="status"></p>
          </div>
        </section>

        <!-- 设置 Tab -->
        <section class="tab-panel" id="tab-settings">
          <div class="tab-inner">
            <h2 class="tab-heading">设置</h2>

            <div class="panel">
              <p class="sub">外观</p>
              <div class="radio-group theme-group">
                <label class="radio"><input type="radio" name="theme" value="system" />跟随系统</label>
                <label class="radio"><input type="radio" name="theme" value="light" />浅色</label>
                <label class="radio"><input type="radio" name="theme" value="dark" />深色</label>
              </div>
            </div>

            <div class="panel">
              <p class="sub">同步</p>
              <div class="field-row">
                <label for="settings-sync-minutes">同步间隔（分钟）</label>
                <input type="number" id="settings-sync-minutes" min="1" max="1440" value="30" />
                <span class="hint" id="settings-sync-hint">当前写入仓库根目录 config.yaml（widget_refresh_minutes）。</span>
              </div>
            </div>

            <div class="panel">
              <p class="sub">下载</p>
              <div class="field-row">
                <label for="settings-download-dir">下载路径</label>
                <input type="text" id="settings-download-dir" readonly="readonly" placeholder="默认: data/attachments" style="flex:1;cursor:pointer" />
              </div>
              <span class="hint" id="settings-download-hint">下载后的文件保存在此目录，点击附件链接可打开文件夹。</span>
            </div>

            <div class="panel" id="panel-credentials">
              <p class="sub">登录凭据</p>
              <div class="field-row">
                <label for="settings-cred-user">学号</label>
                <input type="text" id="settings-cred-user" placeholder="2024210913" />
              </div>
              <div class="field-row">
                <label for="settings-cred-pass">密码</label>
                <input type="password" id="settings-cred-pass" placeholder="校园网密码" />
              </div>
              <span class="hint" id="settings-cred-hint"></span>
              <div class="cred-actions">
                <button class="btn primary" id="settings-btn-save-creds">保存凭据</button>
              </div>
            </div>

            <div class="panel">
              <p class="sub">启动</p>
              <div class="check">
                <input type="checkbox" id="settings-chk-boot" />
                <label for="settings-chk-boot">开机自启</label>
              </div>
              <div class="check">
                <input type="checkbox" id="settings-chk-autosync" />
                <label for="settings-chk-autosync">启动后自动同步</label>
              </div>
              <p class="sub">启动后打开</p>
              <div class="radio-group">
                <label class="radio"><input type="radio" name="startupOpenMode" value="home" />仅主窗口</label>
                <label class="radio"><input type="radio" name="startupOpenMode" value="widget" />仅小组件</label>
                <label class="radio"><input type="radio" name="startupOpenMode" value="both" />同时打开</label>
              </div>
              <span class="hint" id="settings-hint-boot"></span>
            </div>

            <div class="panel">
              <p class="sub">待办预警</p>
              <div class="check"><input type="checkbox" id="settings-alert-master" /><label for="settings-alert-master">启用预警通知</label></div>
              <div class="indent">
                <div class="check"><input type="checkbox" id="settings-alert-3d" /><label for="settings-alert-3d">截止前 3 天提醒</label></div>
                <div class="check"><input type="checkbox" id="settings-alert-1d" /><label for="settings-alert-1d">截止前 1 天提醒</label></div>
                <div class="check"><input type="checkbox" id="settings-alert-u" /><label for="settings-alert-u">紧急待办提醒</label></div>
              </div>
              <p class="sub">冷却时间（分钟）</p>
              <div class="grid-3">
                <div class="field-row">
                  <label for="settings-cool-3d">3 天</label>
                  <input type="number" id="settings-cool-3d" min="30" value="360" />
                </div>
                <div class="field-row">
                  <label for="settings-cool-1d">1 天</label>
                  <input type="number" id="settings-cool-1d" min="15" value="120" />
                </div>
                <div class="field-row">
                  <label for="settings-cool-u">紧急</label>
                  <input type="number" id="settings-cool-u" min="5" value="30" />
                </div>
              </div>
              <div class="field-row" style="margin-top:10px">
                <label for="settings-poll-min">检查间隔（分钟）</label>
                <input type="number" id="settings-poll-min" min="5" max="120" value="15" />
              </div>
            </div>

            <div class="foot">
              <p id="settings-status" class="status"></p>
            </div>
          </div>
        </section>

      </div>
    </div>

    <!-- 底部 Tab 栏 -->
    <nav class="tab-bar" role="tablist">
      <button class="tab-btn active" data-tab="0" role="tab" aria-selected="true">
        <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12L12 3l9 9"/><path d="M5 10v10a1 1 0 001 1h3v-5a2 2 0 014 0v5h3a1 1 0 001-1V10"/></svg>
        <span class="tab-label">首页</span>
      </button>
      <button class="tab-btn" data-tab="1" role="tab" aria-selected="false">
        <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 11l3 3 5-5"/></svg>
        <span class="tab-label">待办</span>
      </button>
      <button class="tab-btn" data-tab="2" role="tab" aria-selected="false">
        <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6a2 2 0 012-2h12a2 2 0 012 2v13a2 2 0 01-2 2H6a2 2 0 01-2-2V6z"/><path d="M8 2v2M16 2v2"/><line x1="10" y1="10" x2="10" y2="16"/><line x1="14" y1="10" x2="14" y2="16"/></svg>
        <span class="tab-label">课程</span>
      </button>
      <button class="tab-btn" data-tab="3" role="tab" aria-selected="false">
        <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <span class="tab-label">设置</span>
      </button>
    </nav>
  </div>

  <!-- 右键菜单（全局，避免被 tab-panels 的 transform 影响 fixed 定位） -->
  <div id="task-context-menu" class="context-menu" style="display:none">
    <div class="context-menu-item" data-action="edit">编辑信息</div>
    <div class="context-menu-item context-menu-item-danger" data-action="delete">删除待办</div>
  </div>
  <div id="task-edit-overlay" class="task-edit-overlay" style="display:none">
    <div class="task-edit-dialog">
      <h3>编辑待办信息</h3>
      <div class="task-edit-field">
        <label>标题</label>
        <input type="text" id="task-edit-title" />
      </div>
      <div class="task-edit-field">
        <label>课程</label>
        <input type="text" id="task-edit-course" />
      </div>
      <div class="task-edit-field">
        <label>截止时间</label>
        <div class="wheel-row">
          <div class="wheel-col">
            <span class="wheel-label">月</span>
            <select id="task-edit-month" class="wheel-select" size="5"></select>
          </div>
          <div class="wheel-col">
            <span class="wheel-label">日</span>
            <select id="task-edit-day" class="wheel-select" size="5"></select>
          </div>
          <div class="wheel-col">
            <span class="wheel-label">时间</span>
            <select id="task-edit-time" class="wheel-select" size="5"></select>
          </div>
        </div>
      </div>
      <div class="task-edit-actions">
        <button class="btn" id="task-edit-cancel">取消</button>
        <button class="btn primary" id="task-edit-save">保存</button>
      </div>
    </div>
  </div>
  <script src="../shared/theme-init.js"></script>
  <script src="shared/utils.js"></script>
  <script src="tabs/home.js"></script>
  <script src="tabs/tasks.js"></script>
  <script src="tabs/courses.js"></script>
  <script src="tabs/settings.js"></script>
  <script src="app.js"></script>
</body>
</html>
